name: Build NAStool Image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - version.py
      - docker/Dockerfile
      - docker/nginx.conf
      - docker/supervisord.conf
      - docker/entrypoint.sh
      - .github/workflows/build.yml
      - requirements.txt

permissions:
  contents: write

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get version
        run: |
          app_version=$(cat version.py |sed -ne "s/APP_VERSION\s=\s'v\(.*\)'/\1/gp")
          echo "app_version=$app_version" >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: |
            linux/amd64
            linux/arm64
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/nas-tools:latest
            ${{ secrets.DOCKER_USERNAME }}/nas-tools:v3
            ${{ secrets.DOCKER_USERNAME }}/nas-tools:${{ env.app_version }}

  release:
    name: Create Tag and Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version
        id: version
        run: |
          VERSION=$(python3 -c "exec(open('version.py').read()); print(APP_VERSION)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get previous tag
        id: pre_tag
        run: |
          PRE_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "pre_tag=$PRE_TAG" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: release_notes
        run: |
          PRE_TAG="${{ steps.pre_tag.outputs.pre_tag }}"
          if [ -n "$PRE_TAG" ]; then
            NOTES=$(git log --pretty=format:"* %s" "$PRE_TAG..HEAD" 2>/dev/null)
          else
            NOTES=$(git log --pretty=format:"* %s" 2>/dev/null)
          fi
          NOTES="${NOTES:-'Initial release'}"
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists, skipping"
            exit 0
          fi
          git tag "$VERSION"
          git push origin "$VERSION"
          gh release create "$VERSION" --notes "${{ steps.release_notes.outputs.notes }}"
