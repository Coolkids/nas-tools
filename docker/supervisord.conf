[unix_http_server]
file=/tmp/supervisor.sock

[supervisord]
nodaemon=true
logfile=/config/supervisord.log
pidfile=/tmp/supervisord.pid

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[program:nginx]
command=/bin/sh -c 'exec nginx -g "daemon off;" 2>&1 | tee -a /config/nginx.log'
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true

[program:nas-tools]
command=/bin/sh -c 'exec /app/.venv/bin/python3 run.py 2>&1 | tee -a /config/nas-tools.log'
directory=/app/nas-tools
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
redirect_stderr=true
environment=NASTOOL_CONFIG="/config/config.yaml"
