[unix_http_server]
file=/tmp/supervisor.sock

[supervisord]
nodaemon=true
logfile=/config/supervisord.log
pidfile=/tmp/supervisord.pid

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[program:nginx]
user=nastool
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/config/nginx.log
stderr_logfile=/config/nginx.log

[program:nas-tools]
user=nastool
command=/app/.venv/bin/python3 run.py
directory=/app/nas-tools
autostart=true
autorestart=true
stdout_logfile=/config/nas-tools.log
stderr_logfile=/config/nas-tools.log
environment=NASTOOL_CONFIG="/config/config.yaml"
